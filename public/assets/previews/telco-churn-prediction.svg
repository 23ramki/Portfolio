<svg width="800" height="360" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <!-- Background -->
  <rect width="800" height="360" fill="#0d1f14"/>

  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a3d26" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="800" height="360" fill="url(#grid)"/>

  <!-- Header bar -->
  <rect width="800" height="44" fill="#122b1c"/>
  <circle cx="20" cy="22" r="5" fill="#ff5f56"/>
  <circle cx="36" cy="22" r="5" fill="#ffbd2e"/>
  <circle cx="52" cy="22" r="5" fill="#27c93f"/>
  <text x="80" y="27" font-size="12" fill="#4ade80" letter-spacing="1">CHURN PREDICTION DASHBOARD</text>
  <text x="750" y="27" font-size="11" fill="#2cb67d" text-anchor="end">XGBoost · SHAP</text>

  <!-- Risk badge -->
  <rect x="560" y="60" width="220" height="72" rx="8" fill="#1f0d0d" stroke="#ef4444" stroke-width="1.5"/>
  <text x="670" y="85" font-size="10" fill="#ef4444" text-anchor="middle" letter-spacing="2">CHURN RISK</text>
  <text x="670" y="118" font-size="32" fill="#ef4444" text-anchor="middle" font-weight="bold">HIGH</text>

  <!-- Probability bar -->
  <text x="20" y="78" font-size="10" fill="#4ade80" letter-spacing="1">CHURN PROBABILITY</text>
  <rect x="20" y="86" width="520" height="20" rx="4" fill="#1a3d26"/>
  <rect x="20" y="86" width="416" height="20" rx="4" fill="url(#probGrad)"/>
  <defs>
    <linearGradient id="probGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2cb67d"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>
  <text x="548" y="101" font-size="13" fill="#ef4444" font-weight="bold">80.2%</text>

  <!-- Divider -->
  <line x1="20" y1="148" x2="780" y2="148" stroke="#1a3d26" stroke-width="1"/>

  <!-- Feature importance label -->
  <text x="20" y="168" font-size="10" fill="#4ade80" letter-spacing="1">FEATURE IMPORTANCE  (SHAP)</text>

  <!-- Feature bars -->
  <!-- Contract Type -->
  <text x="20" y="192" font-size="10" fill="#a3c4ae">Contract Type</text>
  <rect x="160" y="180" width="560" height="13" rx="3" fill="#122b1c"/>
  <rect x="160" y="180" width="185" height="13" rx="3" fill="#2cb67d"/>
  <text x="756" y="191" font-size="10" fill="#2cb67d" text-anchor="end">33.0%</text>

  <!-- Internet Service -->
  <text x="20" y="214" font-size="10" fill="#a3c4ae">Internet Service</text>
  <rect x="160" y="202" width="560" height="13" rx="3" fill="#122b1c"/>
  <rect x="160" y="202" width="79" height="13" rx="3" fill="#2cb67d" opacity="0.85"/>
  <text x="756" y="213" font-size="10" fill="#2cb67d" text-anchor="end">14.1%</text>

  <!-- Tenure -->
  <text x="20" y="236" font-size="10" fill="#a3c4ae">Tenure</text>
  <rect x="160" y="224" width="560" height="13" rx="3" fill="#122b1c"/>
  <rect x="160" y="224" width="62" height="13" rx="3" fill="#2cb67d" opacity="0.7"/>
  <text x="756" y="235" font-size="10" fill="#2cb67d" text-anchor="end">11.0%</text>

  <!-- Monthly Charges -->
  <text x="20" y="258" font-size="10" fill="#a3c4ae">Monthly Charges</text>
  <rect x="160" y="246" width="560" height="13" rx="3" fill="#122b1c"/>
  <rect x="160" y="246" width="50" height="13" rx="3" fill="#2cb67d" opacity="0.6"/>
  <text x="756" y="257" font-size="10" fill="#2cb67d" text-anchor="end">9.0%</text>

  <!-- Metrics row -->
  <rect x="20" y="292" width="230" height="56" rx="6" fill="#122b1c" stroke="#1a3d26" stroke-width="1"/>
  <text x="135" y="312" font-size="9" fill="#4ade80" text-anchor="middle" letter-spacing="1">RECALL</text>
  <text x="135" y="337" font-size="22" fill="#2cb67d" text-anchor="middle" font-weight="bold">78%</text>

  <rect x="266" y="292" width="230" height="56" rx="6" fill="#122b1c" stroke="#1a3d26" stroke-width="1"/>
  <text x="381" y="312" font-size="9" fill="#4ade80" text-anchor="middle" letter-spacing="1">PRECISION</text>
  <text x="381" y="337" font-size="22" fill="#2cb67d" text-anchor="middle" font-weight="bold">71%</text>

  <rect x="512" y="292" width="268" height="56" rx="6" fill="#122b1c" stroke="#1a3d26" stroke-width="1"/>
  <text x="646" y="312" font-size="9" fill="#4ade80" text-anchor="middle" letter-spacing="1">F1 SCORE</text>
  <text x="646" y="337" font-size="22" fill="#2cb67d" text-anchor="middle" font-weight="bold">0.742</text>
</svg>
